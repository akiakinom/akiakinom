<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: #ddd;
            color: #222;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            min-height: 100vh;
            flex-direction: column;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #222;
                color: #ddd;
            }
        }

        h1 {
            font-size: 30vw;
            margin: 0;
            padding: 0;
        }

        p {
            display: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

<canvas id="myCanvas" width="500" height="400" style="border:1px solid #d3d3d3;"></canvas>

<script>
const canvas = document.getElementById('myCanvas');
const ctx = canvas.getContext('2d');

const config = {
    imgSrc: './yahu.jpg', 
    text: "Getting data from Palantir.",
    x: 40,
    y: 40,
    width: 250,
    height: 80
};

const img = new Image();
img.crossOrigin = "anonymous";
img.src = config.imgSrc;

function meow(text) {
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    drawSpeechBubble(ctx, config.x, config.y, config.width, config.height, 20);

    ctx.fillStyle = "#000";
    ctx.font = "16px Arial";
    ctx.textAlign = "center";
    ctx.fillText(text, config.x + (config.width / 2), config.y + (config.height / 2) + 5);
}

img.onload = () => {
    meow(config.text);
};

function drawSpeechBubble(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    
    ctx.lineTo(x + (width / 2) + 10, y + height);
    ctx.lineTo(x + (width / 2), y + height + 15);
    ctx.lineTo(x + (width / 2) - 10, y + height);
    
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.stroke();
}

(async () => {
    const response = await fetch("https://isod.ee.pw.edu.pl/isod-portal/wapi?q=rooms&refcode=GE-b%20005");
    const data = await response.json();

    if (data.taken) {
        meow(`WRS jest czynny od ${data.takenAt.slice(-5)}`);
    } else {
        meow(`Nie widzę nikogo w WRS-ie.`);
    }
})();
</script>

</body>
</html>
