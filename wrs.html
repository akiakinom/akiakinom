<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czy WRS jest otwarty?</title>
    <style>

        body {
            background: #ddd;
            color: #222;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            min-height: 100vh;
            flex-direction: column;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #222;
                color: #ddd;
            }
        }

        h1 {
            font-size: 30vw;
            margin: 0;
            padding: 0;
        }

        p {
            display: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <h1 id="status">---</h1>
    <p id="time_container">Otwarte o <span id="time"></span> przez <span id="author"></span>.</p>

    <body>

    <script>
        (async () => {
        try {
            const response = await fetch("https://isod.ee.pw.edu.pl/isod-portal/wapi?q=rooms&refcode=GE-b%20005");
            const data = await response.json();
            document.getElementById("status").innerText = data.taken ? "TAK" : "NIE";
            if (data.taken) {
            document.getElementById("time_container").style.display = "block";
            document.getElementById("time").innerText = data.takenAt.slice(-5);
            document.getElementById("author").innerText = data.takenBy[0] + "████ " + data.takenBy[1] + "████";
            }
        } catch (e) {
            document.getElementById("status").innerText = "ERR";
        }
        })();
    </script>
</body>

</body>
</html>
